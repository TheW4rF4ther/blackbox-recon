<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="520" viewBox="0 0 1800 520" role="img" aria-labelledby="title desc">
  <title id="title">Blackbox Recon</title>
  <desc id="desc">Dark red-team style Blackbox Recon banner with cube, radar, and wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050708"/>
      <stop offset="0.55" stop-color="#0b1114"/>
      <stop offset="1" stop-color="#020304"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d8e0e5"/>
      <stop offset="0.45" stop-color="#7a858c"/>
      <stop offset="1" stop-color="#171c20"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff3b35"/>
      <stop offset="1" stop-color="#a90000"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#263139" stroke-width="1" opacity="0.28"/>
    </pattern>
    <pattern id="dots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#43505a" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1800" height="520" fill="url(#bg)"/>
  <rect width="1800" height="520" fill="url(#grid)" opacity="0.45"/>
  <rect width="1800" height="520" fill="url(#dots)" opacity="0.28"/>

