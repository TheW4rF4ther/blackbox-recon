# Blackbox Recon Configuration - OpenAI Example

ai:
  provider: openai
  api_key: ${OPENAI_API_KEY}  # Set via environment variable
  model: gpt-4
  temperature: 0.3
  max_tokens: 4000

recon:
  threads: 50
  timeout: 30
  ports: top1000
  rate_limit: 0

modules:
  - subdomain
  - portscan
  - technology
  - vulnscan

output_format: json
verbose: false
